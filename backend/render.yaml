services:
  - type: web
    name: verifai-backend
    runtime: python
    pythonVersion: 3.11
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: DATABASE_URL
        scope: run
      - key: PYTHONUNBUFFERED
        value: true
